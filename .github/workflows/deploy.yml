name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # Masuk ke direktori proyek di VPS
            cd ${{ secrets.VPS_PATH }}

            # Ambil update kode terbaru dari Git
            git fetch origin
            git reset --hard origin/main

            # Restart dan build ulang container Docker menggunakan Docker Compose
            docker compose down
            docker compose up -d --build

            # Bersihkan build image gantung untuk menjaga space disk VPS
            docker image prune -f