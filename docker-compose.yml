services:
  # DATABASE
  db:
    image: mysql:8.0
    container_name: al_anwar_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    # ports:
    #   - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 20s
      retries: 10

  # PHPMYADMIN (Database GUI) - Uncomment if needed in dev
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: al_anwar_phpmyadmin
    restart: always
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8081:80"
    depends_on:
      - db

  # BACKEND (Go Fiber)
  backend:
    build: ./backend_go
    image: ${DOCKER_HUB_USERNAME:-alanwar}/al_anwar_backend:latest
    container_name: al_anwar_backend
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend_go/.env
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_PASS=${DB_PASSWORD}
      - DB_NAME=${DB_DATABASE}
      - APP_URL=${APP_PROTOCOL:-http}://${APP_API_SUBDOMAIN:-localhost:8000}
      - APP_EXTERNAL_URL=${APP_PROTOCOL:-http}://${APP_API_SUBDOMAIN:-localhost:8000}
      - CORS_ORIGINS=${APP_PROTOCOL:-http}://${APP_DOMAIN:-localhost},${APP_PROTOCOL:-http}://www.${APP_DOMAIN:-localhost},http://localhost:5173,http://localhost:3000,http://localhost:5174
    ports:
      - "8000:8080"

  # FRONTEND (SvelteKit)
  frontend:
    build: ./frontend_svelte
    image: ${DOCKER_HUB_USERNAME:-alanwar}/al_anwar_frontend:latest
    container_name: al_anwar_frontend
    restart: on-failure
    depends_on:
      - backend
    env_file:
      - ./frontend_svelte/.env
    environment:
      - PUBLIC_API_URL=${APP_PROTOCOL:-http}://${APP_API_SUBDOMAIN:-localhost:8000}
      - INTERNAL_API_URL=http://backend:8080
    ports:
      - "3000:3000"

  # NGROK (Exposure for Webhooks) - Uncomment if needed in dev
  ngrok:
    image: ngrok/ngrok:latest
    container_name: al_anwar_ngrok
    restart: always
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command:
      - "http"
      - "backend:8080"
    ports:
      - "4040:4040"
    depends_on:
      - backend

volumes:
  mysql_data:
